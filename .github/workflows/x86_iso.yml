name: x86_builds

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_test:
    name: build-test (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, x86_32]

    steps:
      - uses: actions/checkout@v4

      - name: install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            gcc \
            gcc-multilib \
            gcc-mingw-w64 \
            make \
            nasm \
            python3 \
            xorriso

      - name: make test build
        run: make ARCH=${{ matrix.arch }} IMAGE_FORMAT=img

  build_iso:
    name: iso (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, x86_32]

    steps:
      - uses: actions/checkout@v4

      - name: install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            gcc \
            gcc-multilib \
            gcc-mingw-w64 \
            make \
            nasm \
            python3 \
            xorriso

      - name: make iso
        run: make ARCH=${{ matrix.arch }} IMAGE_FORMAT=iso

      - name: upload iso
        if: ${{ env.ACTIONS_RUNTIME_TOKEN != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: apheleia-${{ matrix.arch }}-iso
          path: bin/*_${{ matrix.arch }}.iso
          if-no-files-found: error
