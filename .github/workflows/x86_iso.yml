name: x86_builds

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_test:
    name: build-test (${{ matrix.arch }})
    runs-on: ubuntu-latest
    env:
      GNU_CC_x86_32: gcc
      GNU_LD_x86_32: ld
      GNU_OC_x86_32: objcopy
      GNU_ST_x86_32: strip
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, x86_32]

    steps:
      - uses: actions/checkout@v4

      - name: install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            gcc \
            gcc-multilib \
            gcc-mingw-w64 \
            make \
            nasm \
            python3 \
            xorriso

      - name: make test build
        run: make ARCH=${{ matrix.arch }} IMAGE_FORMAT=img

  build_riscv:
    name: build-riscv (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [riscv_64, riscv_32]

    steps:
      - uses: actions/checkout@v4

      - name: install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            lld \
            llvm \
            make \
            python3

      - name: make riscv image
        run: make ARCH=${{ matrix.arch }} IMAGE_FORMAT=img TOOLCHAIN=llvm

  build_iso:
    name: iso (${{ matrix.arch }})
    runs-on: ubuntu-latest
    env:
      GNU_CC_x86_32: gcc
      GNU_LD_x86_32: ld
      GNU_OC_x86_32: objcopy
      GNU_ST_x86_32: strip
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, x86_32]

    steps:
      - uses: actions/checkout@v4

      - name: install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils \
            gcc \
            gcc-multilib \
            gcc-mingw-w64 \
            make \
            nasm \
            python3 \
            xorriso

      - name: make iso
        run: make ARCH=${{ matrix.arch }} IMAGE_FORMAT=iso

      - name: upload iso
        if: ${{ env.ACTIONS_RUNTIME_TOKEN != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: apheleia-${{ matrix.arch }}-iso
          path: bin/*_${{ matrix.arch }}.iso
          if-no-files-found: error
